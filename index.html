<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH Luxe Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f8f8f8;
}
.header{
    position:sticky;
    top:0;
    background:rgba(15,61,46,0.95);
    padding:12px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}
.logo-container{display:flex;align-items:center;gap:12px;}
.logo{height:50px;}
.brand-name{
    color:gold;
    font-family:'Great Vibes',cursive;
    font-size:30px;
}
.nav-links a{
    color:gold;
    text-decoration:none;
    margin-left:20px;
}
.hero{
    height:55vh;
    background:linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),url('hero.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}
.hero h1{
    font-family:'Playfair Display',serif;
    font-size:48px;
}
.container{
    max-width:1250px;
    margin:auto;
    padding:40px 20px;
}
.filters{
    text-align:center;
    margin-bottom:40px;
}
.filters input,.filters select{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
.section-title{
    font-family:'Playfair Display',serif;
    color:#0f3d2e;
    border-bottom:2px solid gold;
    display:inline-block;
    margin:40px 0 20px;
}
.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}
.product{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}
.product:hover{transform:translateY(-8px);}
.product img{
    width:100%;
    height:260px;
    object-fit:cover;
    cursor:pointer;
}
.product-content{
    padding:15px;
    text-align:center;
}
button{
    background:#0f3d2e;
    color:gold;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:gold;
    color:#0f3d2e;
}
.cart{
    position:fixed;
    right:20px;
    bottom:20px;
    width:300px;
    background:#0f3d2e;
    color:gold;
    padding:15px;
    border-radius:15px;
    max-height:80vh;
    overflow-y:auto;
}
.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}
.remove-btn{
    background:red;
    color:white;
    padding:4px 8px;
    font-size:12px;
}
.footer{
    background:#0f3d2e;
    color:gold;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* IMAGE POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:2000;
}
.popup img{
    max-width:80%;
    max-height:80%;
    border-radius:15px;
}
</style>
</head>
<body>

<header class="header">
<div class="logo-container">
<img src="logo.png" class="logo">
<span class="brand-name">RH Luxe Hub</span>
</div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#shop">Shop</a>
</div>
</header>

<section class="hero">
<div>
<h1>Luxury Redefined</h1>
<p>Timeless elegance, crafted for you</p>
</div>
</section>

<div class="container" id="shop">

<div class="filters">
<input type="text" id="searchInput" placeholder="Search..." onkeyup="applyFilters()">
<input type="number" id="minPrice" placeholder="Min Price" onkeyup="applyFilters()">
<input type="number" id="maxPrice" placeholder="Max Price" onkeyup="applyFilters()">

<select id="sortPrice" onchange="sortProducts()">
<option value="">Sort By Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>
</div>

<div class="product-grid" id="productGrid"></div>

</div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems">No items yet</div>
<p><strong>Total: Rs. <span id="cartTotal">0</span></strong></p>
<button onclick="sendToWhatsApp()">Order on WhatsApp</button>
<button onclick="clearCart()">Clear Cart</button>
</div>

<div class="footer">
© 2026 RH Luxe Hub | Designed for Elegance
</div>

<div class="popup" id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

<script>
const products = [
["Black Beauty Bracelet.jpg",499],
["Single Clove Bracelet.jpg",499],
["Silver Round Jhumkay.jpg",849],
["Silver Jhumkay.jpg",849],
["Silver Disk Golden Pendant.jpg",449],
["Golden White Heart Pendant.jpg",599],
["Golden Tripple Chain Bracelet.jpg",649],
["Golden Sphere bracelet.jpg",649],
["Golden Silver Stone Bracelet.jpg",649],
["Golden Round Jhumkay.jpg",849],
["Golden Lucky Charm Bracelet.jpg",649],
["Golden Lockheart Bracelet.jpg",499],
["Golden Jhumkay.jpg",849],
["Golden Heart Pendant.jpg",749],
["Golden Emerald Bracelet.jpg",749],
["Golden Double Heart Pendant.jpg",749],
["Golden Clove Bracelet.jpg",649],
["Golden Cherry Heart Bracelet.jpg",649],
["Golden Chain Bracelet.jpg",399],
["Golden Butterfly Bracelet.jpg",499],
["Golden Black Heart Bracelet.jpg",749],
["Cherry Red Heart Pendant.jpg",749]
];

let cart=[];

function formatName(filename){
    return filename.replace(".jpg","");
}

function renderProducts(productArray=products){
    const grid=document.getElementById("productGrid");
    grid.innerHTML="";

    productArray.forEach(([file,price])=>{
        grid.innerHTML += `
        <div class="product" data-name="${formatName(file)}" data-price="${price}">
            <img src="${file}" onclick="openPopup('${file}')">
            <div class="product-content">
                <h2>${formatName(file)}</h2>
                <p>Rs. ${price}</p>
                <button onclick="addToCart('${formatName(file)}',${price})">Add to Cart</button>
            </div>
        </div>`;
    });
}

function addToCart(name,price){
    cart.push({name,price});
    displayCart();
}

function removeFromCart(index){
    cart.splice(index,1);
    displayCart();
}

function clearCart(){
    cart=[];
    displayCart();
}

function displayCart(){
    const cartDiv=document.getElementById("cartItems");
    const totalDiv=document.getElementById("cartTotal");

    if(cart.length===0){
        cartDiv.innerHTML="No items yet";
        totalDiv.textContent="0";
        return;
    }

    let total=0;
    cartDiv.innerHTML="";

    cart.forEach((item,index)=>{
        total += item.price;
        cartDiv.innerHTML += `
        <div class="cart-item">
            <span>${item.name} - Rs.${item.price}</span>
            <button class="remove-btn" onclick="removeFromCart(${index})">X</button>
        </div>`;
    });

    totalDiv.textContent=total;
}

function sendToWhatsApp(){
    if(cart.length===0){
        alert("Cart is empty!");
        return;
    }

    let total=0;
    let message="I want to order:%0A";

    cart.forEach(item=>{
        total += item.price;
        message += `- ${item.name} (Rs.${item.price})%0A`;
    });

    message += `%0ATotal: Rs.${total}`;

    window.open("https://wa.me/923451138336?text="+message,"_blank");
}

function applyFilters(){
    let search=document.getElementById("searchInput").value.toLowerCase();
    let min=parseInt(document.getElementById("minPrice").value)||0;
    let max=parseInt(document.getElementById("maxPrice").value)||Infinity;

    let filtered=products.filter(([file,price])=>{
        let name=formatName(file).toLowerCase();
        return name.includes(search) && price>=min && price<=max;
    });

    renderProducts(filtered);
}

function sortProducts(){
    let sort=document.getElementById("sortPrice").value;
    let sorted=[...products];

    if(sort==="low") sorted.sort((a,b)=>a[1]-b[1]);
    if(sort==="high") sorted.sort((a,b)=>b[1]-a[1]);

    renderProducts(sorted);
}

function openPopup(src){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=src;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

renderProducts();
</script>

</body>
</html>
